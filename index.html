<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Bản đồ du lịch phường KHÁNH HỘI</title>

    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>Địa điểm du lịch</h3>
        <div class="group">
        <h4>🏛️ Cơ quan hành chính</h4>
        <ul id="hanhchinh"></ul>
    </div>

    <div class="group">
        <h4>⛪ Cơ sở tôn giáo</h4>
        <ul id="tongiao"></ul>
    </div>
        <div id="routeBox" style="display:none; position:fixed; top:30%; left:50%; transform:translate(-50%, -50%);
background:white; padding:15px; border-radius:8px; z-index:1000; width:250px;">

    <b>Nhập vị trí của bạn</b><br><br>

    <input id="startPoint" type="text" placeholder="vd: 71 Tôn Đản, Q4" style="width:100%; padding:6px;"><br><br>

    <button onclick="startRouting()">Xác nhận</button>
    <button onclick="closeBox()">Hủy</button>
</div>
    </div>

    <!-- Map -->
    <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-routing-machine/3.2.12/leaflet-routing-machine.min.js"></script>
<script src="script.js"></script>

</body>
</html>
